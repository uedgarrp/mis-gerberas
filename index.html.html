    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var leafsContainers = document.querySelectorAll('.flower__leafs');
      
      leafsContainers.forEach(function(container) {
        var circle = container.querySelector('.flower__white-circle');
        
        // Función para crear e insertar los pétalos asegurando que queden detrás del centro
        function createPetal(i, rotateX, width, height, gradient, zIndex) {
          var div = document.createElement('div');
          div.className = 'flower__leaf';
          div.style.cssText = `transform: translate(-50%, -5%) rotate(${i}deg) rotateX(${rotateX}deg); width:${width}vmin; height:${height}vmin; border-radius:50% 50% 40% 40%/60% 60% 40% 40%; position:absolute; bottom:0; left:50%; background-image:${gradient}; transform-origin:bottom center; opacity:0.9; z-index:${zIndex};`;
          
          if (circle) {
              container.insertBefore(div, circle);
          } else {
              container.appendChild(div);
          }
        }

        // Capa Exterior (Pétalos largos y brillantes completando los 360 grados)
        for (let i = 0; i < 360; i += 15) {
            // Sombra en la parte trasera de la flor para dar volumen 3D
            let gradient = (i > 90 && i < 270) 
              ? 'linear-gradient(to top, #FFA000, #FFD700, #FFE57F)' 
              : 'linear-gradient(to top, #FFB800, #FFE800, #FFF176)';
            createPetal(i, 15, 3.5, 14, gradient, 0);
        }
        
        // Capa Interior (Pétalos un poco más cortos, llenando huecos)
        for (let i = 7.5; i < 360; i += 15) {
            createPetal(i, 25, 3.2, 12, 'linear-gradient(to top, #FF8F00, #FFC107, #FFD54F)', 1);
        }

        // Capa Central (Pétalos muy pequeños pegados al centro oscuro)
        for (let i = 0; i < 360; i += 20) {
            createPetal(i, 40, 2.5, 8, 'linear-gradient(to top, #E65100, #FFA000, #FFD740)', 2);
        }
      });
      
      // Nos aseguramos de que el centro café siempre esté por encima de todos los pétalos
      var circles = document.querySelectorAll('.flower__white-circle');
      circles.forEach(c => c.style.zIndex = "10");
    });
    </script>
